services:
  backend:
    build: ./backend
    container_name: sepsa-backend
    # Yeh line sabse important hai, iske bina server exit ho jayega
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/storage:/app/storage
    environment:
      - PYTHONUNBUFFERED=1

  admin-panel:
    build: ./backend
    container_name: sepsa-admin
    # Port aur Address specify karna zaroori hai Docker network ke liye
    command: python -m streamlit run admin_panel.py --server.port=8501 --server.address=0.0.0.0
    volumes:
      - ./backend:/app
    ports:
      - "8501:8501"
    depends_on:
      - backend

  frontend:
    build: ./frontend
    container_name: sepsa-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules   # Anonymous volume for modules
      - /app/.next          # Anonymous volume for cache
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true